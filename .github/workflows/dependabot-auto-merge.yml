name: Dependabot auto-merge

# Hands-off updates: for Dependabot's low-risk bumps (patch and minor), enable
# auto-merge so GitHub merges them on its own once the CI build passes. Major
# updates are skipped here and left open for manual review.
on: pull_request

permissions:
  contents: write
  pull-requests: write

jobs:
  auto-merge:
    if: github.actor == 'dependabot[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Fetch update metadata
        id: meta
        uses: dependabot/fetch-metadata@v3
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
      - name: Enable auto-merge for patch and minor updates
        if: >-
          steps.meta.outputs.update-type == 'version-update:semver-patch' ||
          steps.meta.outputs.update-type == 'version-update:semver-minor'
        # Retry a few times: enabling auto-merge occasionally hits a transient
        # GitHub API error, which would otherwise strand a safe update.
        run: |
          for attempt in 1 2 3; do
            if gh pr merge --auto --squash "$PR_URL"; then
              exit 0
            fi
            echo "Attempt $attempt to enable auto-merge failed; retrying in 20s..."
            sleep 20
          done
          echo "Could not enable auto-merge after 3 attempts."
          exit 1
        env:
          PR_URL: ${{ github.event.pull_request.html_url }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
