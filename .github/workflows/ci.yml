name: CI

# Validate every pull request (including Dependabot's) so an update can only be
# merged once it still type-checks and builds. Pushes to main are already built
# by the deploy workflow.
on:
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run build
