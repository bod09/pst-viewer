version: 2
updates:
  # Keep npm dependencies current. Minor/patch bumps land in one grouped PR to
  # cut noise; majors come as their own PRs so they can be reviewed individually.
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    commit-message:
      prefix: deps
    groups:
      minor-and-patch:
        update-types:
          - minor
          - patch

  # Keep the GitHub Actions used by the workflows up to date too.
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    commit-message:
      prefix: ci
